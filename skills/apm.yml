name: dotfile-skills
version: 0.1.0
description: hayato's agent skills managed via Microsoft APM (Agent Package Manager).
  Self-authored skills live under .apm/skills/; external skills are pulled as dependencies.
  `apm install` deploys to ./.agents/skills/, which is a symlink to ~/.agents/skills/
  created by chezmoi's run_onchange_after_apm-install.sh.
targets:
- agent-skills
dependencies:
  apm:
  - anthropics/skills/skills/frontend-design
  - anthropics/skills/skills/skill-creator
  - vercel-labs/agent-skills/skills/web-design-guidelines
  - vercel-labs/agent-browser/skills/agent-browser
  - GoogleChrome/modern-web-guidance/skills/modern-web-guidance
  - openclaw/acpx/skills/acpx
  - emilkowalski/skill/skills/emil-design-eng
  - dominikmartn/nothing-design-skill/nothing-design
  - vuejs-ai/skills/skills/vue-best-practices
  - vercel-labs/skills/skills/find-skills
