name: dotfile-skills
version: 0.1.0
description: hayato's agent skills managed via Microsoft APM (Agent Package Manager).
  Self-authored skills live under .apm/skills/; external skills are pulled as dependencies.
  `apm install` deploys to ./.agents/skills/, which is a symlink to ~/.agents/skills/
  created by chezmoi's run_onchange_after_apm-install.sh.
targets:
- agent-skills
