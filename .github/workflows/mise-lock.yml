name: Update mise.lock

# Mend ホスト型 Renovate は mise config を trust できず `mise lock` が失敗するため
# (renovate.json5 参照)、lockfile の更新はこのワークフローが肩代わりする。
# Renovate が config.toml を更新したブランチへ push されると、mise.lock を再生成して
# GitHub App トークンで PR ブランチへ直接コミットする。App コミットは GITHUB_TOKEN と
# 違い後続ワークフロー (mise-check) を再トリガーするので automerge の gate が再評価される。

on:
  push:
    branches-ignore:
      - main
    paths:
      - home/dot_config/mise/config.toml
      - .github/workflows/mise-lock.yml
      - .github/scripts/commit-via-graphql.ts

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: mise-lock-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  update-mise-lock:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App Token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: false
          cache: true

      - name: Regenerate and commit mise.lock via GraphQL
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          FILES: home/dot_config/mise/mise.lock
          MESSAGE: "chore(mise): update mise.lock"
          REGENERATE_CMD: |
            ( cd home/dot_config/mise && rm -f mise.lock && mise lock )
        run: mise exec bun -- bun .github/scripts/commit-via-graphql.ts
